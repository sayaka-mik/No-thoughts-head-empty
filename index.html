<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Procedural Space Simulator</title>
  <style>
    /* 기본 리셋 및 터치 액션 제어 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      /* 모바일 브라우저 오작동(새로고침, 스와이프 등) 완벽 차단 */
      touch-action: none; 
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
    }
    /* 가상 조이스틱 UI (터치 시점 표시용) */
    #joystick-origin {
      position: absolute;
      width: 60px;
      height: 60px;
      margin-left: -30px;
      margin-top: -30px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      pointer-events: none;
      display: none;
      box-sizing: border-box;
      z-index: 10;
    }
    #joystick-thumb {
      position: absolute;
      width: 20px;
      height: 20px;
      margin-left: -10px;
      margin-top: -10px;
      background-color: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      pointer-events: none;
      display: none;
      z-index: 10;
    }
  </style>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.150.1/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="joystick-origin"></div>
  <div id="joystick-thumb"></div>

  <script type="module">
    import * as THREE from 'three';

    // ==========================================
    // 1. 핵심 환경 설정 (Core Setup)
    // ==========================================
    const scene = new THREE.Scene();
    
    // 시야 제한 및 자연스러운 페이드 아웃을 위한 안개 (Popping 방지)
    scene.fog = new THREE.FogExp2(0x020205, 0.003);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
    
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    // 모바일 해상도 제한 (최대 2)
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ==========================================
    // 2. 플레이어 및 우주선 객체 생성 (Player Group)
    // ==========================================
    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    // 우주선 메쉬 생성
    const shipGeo = new THREE.ConeGeometry(0.5, 2, 4);
    shipGeo.rotateX(Math.PI / 2); // Z축(전진방향)을 바라보도록 회전
    const shipMat = new THREE.MeshStandardMaterial({ 
      color: 0x88ccff, 
      roughness: 0.4, 
      metalness: 0.8,
      wireframe: true // 미니멀리즘적인 와이어프레임 렌더링
    });
    const shipMesh = new THREE.Mesh(shipGeo, shipMat);
    shipMesh.position.set(0, -1, -3); // 카메라 살짝 아래/앞에 배치
    playerGroup.add(shipMesh);

    // 카메라도 플레이어 그룹에 종속
    playerGroup.add(camera);

    // 조명 설정
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xffffff, 1, 100);
    pointLight.position.set(0, 5, 5);
    playerGroup.add(pointLight);

    // ==========================================
    // 3. 절차적 별 생성 시스템 (Procedural Starfield)
    // ==========================================
    const CHUNK_SIZE = 200;
    const CHUNK_RADIUS = 1; // 3x3x3 렌더링 반경
    const STARS_PER_CHUNK = 200;
    const activeChunks = new Map(); // GC 관리를 위한 맵

    // 변위(Displacement)가 적용된 절차적 별 모양 지오메트리
    const baseStarGeo = new THREE.IcosahedronGeometry(1, 0);
    const posAttr = baseStarGeo.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
      // 완벽한 구체가 아닌 랜덤한 형태로 정점 변형
      const scale = 0.4 + Math.random() * 1.2;
      posAttr.setXYZ(i, posAttr.getX(i) * scale, posAttr.getY(i) * scale, posAttr.getZ(i) * scale);
    }
    baseStarGeo.computeVertexNormals();

    const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const starPalettes = [0x88ccff, 0xffddaa, 0xff6666, 0xffffff]; // 청백색, 황색, 적색, 백색

    function getChunkKey(x, y, z) {
      return `${x}_${y}_${z}`;
    }

    function createChunk(cx, cy, cz) {
      // InstancedMesh를 사용하여 1 Draw Call로 수백 개의 별 렌더링 (최적화)
      const instancedMesh = new THREE.InstancedMesh(baseStarGeo, starMaterial, STARS_PER_CHUNK);
      const dummy = new THREE.Object3D();
      const color = new THREE.Color();

      for (let i = 0; i < STARS_PER_CHUNK; i++) {
        // 청크 내 무작위 위치
        dummy.position.set(
          (cx + Math.random() - 0.5) * CHUNK_SIZE,
          (cy + Math.random() - 0.5) * CHUNK_SIZE,
          (cz + Math.random() - 0.5) * CHUNK_SIZE
        );
        
        // 무작위 크기 및 회전 (Seed 대용)
        const s = Math.random() * 0.4 + 0.1;
        dummy.scale.set(s, s, s);
        dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);

        // 무작위 발광 컬러 지정
        color.setHex(starPalettes[Math.floor(Math.random() * starPalettes.length)]);
        instancedMesh.setColorAt(i, color);
      }
      
      instancedMesh.instanceMatrix.needsUpdate = true;
      instancedMesh.instanceColor.needsUpdate = true;
      scene.add(instancedMesh);
      return instancedMesh;
    }

    function updateChunks(playerPos) {
      const px = Math.floor(playerPos.x / CHUNK_SIZE);
      const py = Math.floor(playerPos.y / CHUNK_SIZE);
      const pz = Math.floor(playerPos.z / CHUNK_SIZE);

      const neededChunks = new Set();
      
      // 플레이어 주변 N x N x N 영역 계산
      for (let x = -CHUNK_RADIUS; x <= CHUNK_RADIUS; x++) {
        for (let y = -CHUNK_RADIUS; y <= CHUNK_RADIUS; y++) {
          for (let z = -CHUNK_RADIUS; z <= CHUNK_RADIUS; z++) {
            neededChunks.add(getChunkKey(px + x, py + y, pz + z));
          }
        }
      }

      // 새로 진입한 청크 생성
      neededChunks.forEach(key => {
        if (!activeChunks.has(key)) {
          const [cx, cy, cz] = key.split('_').map(Number);
          activeChunks.set(key, createChunk(cx, cy, cz));
        }
      });

      // 멀어진 청크 메모리 해제 (Garbage Collection)
      for (const [key, mesh] of activeChunks.entries()) {
        if (!neededChunks.has(key)) {
          scene.remove(mesh);
          mesh.dispose(); // GPU 메모리 해제
          activeChunks.delete(key);
        }
      }
    }

    // ==========================================
    // 4. 원지(One-Thumb) 터치 조작 시스템
    // ==========================================
    let touchOrigin = null;
    let touchDelta = { x: 0, y: 0 };
    let isTouching = false;

    const uiOrigin = document.getElementById('joystick-origin');
    const uiThumb = document.getElementById('joystick-thumb');

    window.addEventListener('touchstart', (e) => {
      if (e.touches.length > 1) return; // 싱글 터치만 처리
      const t = e.touches[0];
      touchOrigin = { x: t.clientX, y: t.clientY };
      touchDelta = { x: 0, y: 0 };
      isTouching = true;

      // UI 표시
      uiOrigin.style.display = 'block';
      uiOrigin.style.left = `${touchOrigin.x}px`;
      uiOrigin.style.top = `${touchOrigin.y}px`;
      
      uiThumb.style.display = 'block';
      uiThumb.style.left = `${touchOrigin.x}px`;
      uiThumb.style.top = `${touchOrigin.y}px`;
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (!isTouching) return;
      const t = e.touches[0];
      touchDelta.x = t.clientX - touchOrigin.x;
      touchDelta.y = t.clientY - touchOrigin.y;

      // UI 이동
      uiThumb.style.left = `${t.clientX}px`;
      uiThumb.style.top = `${t.clientY}px`;
    }, { passive: false });

    const handleTouchEnd = () => {
      isTouching = false;
      touchDelta = { x: 0, y: 0 };
      uiOrigin.style.display = 'none';
      uiThumb.style.display = 'none';
    };

    window.addEventListener('touchend', handleTouchEnd);
    window.addEventListener('touchcancel', handleTouchEnd);

    // ==========================================
    // 5. 메인 루프 & 반응형 대응
    // ==========================================
    const BASE_SPEED = 0.5;
    const MAX_BOOST = 1.5;

    function animate() {
      requestAnimationFrame(animate);

      // 모바일 화면 기준 정규화 (-1.0 ~ 1.0)
      const screenRadius = Math.min(window.innerWidth, window.innerHeight) / 2;
      const normX = Math.max(-1, Math.min(1, touchDelta.x / screenRadius));
      const normY = Math.max(-1, Math.min(1, touchDelta.y / screenRadius));
      
      // 중심점으로부터의 거리 (조향 강도 및 부스트 연동)
      const dist = Math.sqrt(normX * normX + normY * normY);

      if (isTouching && dist > 0) {
        const turnSpeed = 0.02 * dist;
        // Pitch (상하), Yaw (좌우) 회전
        playerGroup.rotateY(-normX * turnSpeed); 
        playerGroup.rotateX(-normY * turnSpeed); 
      }

      // Visual Roll (은행 효과): 물리 회전축과 독립적으로 우주선 메쉬만 기울임
      const targetRoll = isTouching ? -normX * (Math.PI / 3) : 0; // 최대 60도 롤링
      shipMesh.rotation.z += (targetRoll - shipMesh.rotation.z) * 0.1; // 보간(Lerp)으로 부드럽게 복귀

      // 자동 전진 (가속도 연동)
      const currentSpeed = BASE_SPEED + (dist * MAX_BOOST);
      playerGroup.translateZ(-currentSpeed); // Three.js는 Z축 음수 방향이 Front

      // 절차적 청크 업데이트
      updateChunks(playerGroup.position);

      renderer.render(scene, camera);
    }

    // 반응형 리사이징
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 초기 청크 생성 후 루프 시작
    updateChunks(playerGroup.position);
    animate();
  </script>
</body>
</html>
